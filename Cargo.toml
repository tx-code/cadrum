[package]
name = "cadrum"
version = "0.4.1"
edition = "2021"
description = "Minimal Rust bindings for OpenCASCADE 7.9.3."
license = "MIT"
readme = "README.md"
repository = "https://github.com/lzpel/cadrum"
keywords = ["opencascade", "cad", "step", "b-rep", "geometry"]
categories = ["graphics", "science"]

[features]
default = ["bundled", "color"]
# Download and build OCCT 7.9.3 from source during cargo build
bundled = []
# Use a system-installed OCCT via the OCCT_ROOT environment variable
prebuilt = []
# Enable TShapeId, Rgb, and colormap on Shape for face-level color tracking
color = []

[dependencies]
cxx = "1"
glam = { version = "0.29", features = ["std"] }


[build-dependencies]
cxx-build = "1"
# download OpenCASCADE
ureq = "3"
# extract tar.gz
libflate = "2"
tar = "0.4"
cmake = "0.1"

[package.metadata.docs.rs]
targets = ["x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
