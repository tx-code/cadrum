name: prebuilt

on:
  push:
    branches: [prebuilt]
  workflow_dispatch:

jobs:
  # Docker 経由 (cross toolchain が Linux 側で成熟している)。
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm
          - target: x86_64-pc-windows-gnu
            runs-on: ubuntu-latest
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: build
        run: make cadrum-occt-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: cadrum-occt-${{ matrix.target }}
          path: out/${{ matrix.target }}/cadrum-occt-*.tar.gz

  # native Windows runner + native cl.exe で作る。
  # cargo-xwin/clang-cl 経由の prebuild は MSVC STL template の COMDAT 排出判断が
  # native cl.exe と食い違い、ユーザ側リンク時に `std::_Variant_storage_<...>`
  # 未解決シンボルを量産する (issue #73)。native ビルドは ABI 境界を踏まない。
  build-windows-msvc:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: ilammy/msvc-dev-cmd@v1

      - name: install make
        run: choco install make -y

      # Git for Windows ships a GNU coreutils `link.exe` at /usr/bin/link.exe
      # which shadows MSVC's `link.exe` when rustc drives the linker from a
      # bash shell (bash prepends /usr/bin to PATH before msvc-dev-cmd's
      # additions take effect). Remove it so rustc resolves MSVC's linker.
      - name: unshadow MSVC link.exe
        shell: bash
        run: rm -f /usr/bin/link /usr/bin/link.exe

      - name: build
        shell: bash
        env:
          CARGO_BUILD_TARGET: x86_64-pc-windows-msvc
        run: make cadrum-occt

      - uses: actions/upload-artifact@v4
        with:
          name: cadrum-occt-x86_64-pc-windows-msvc
          path: out/cadrum-occt-*.tar.gz

  release:
    needs: [build, build-windows-msvc]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: cadrum-occt-v800
          name: OCCT prebuilt v8.0.0
          files: dist/*.tar.gz
